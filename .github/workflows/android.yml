name: Compilar APK Android

# Compila la APK en la nube en cada push a main (o manualmente).
# La APK queda como "artifact" descargable en la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Crear .env con las claves (desde secrets del repo)
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Compilar la web
        run: npm run build

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Restaurar el keystore de firma (desde secret)
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/zonacliente-release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/zonacliente-release.keystore" >> $GITHUB_ENV

      - name: Leer versión de la app
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          # El versionCode usa el número de ejecución del workflow (siempre creciente)
          # para que cada build se reconozca como una actualización. Ver paso de compilación.

      - name: Compilar APK de release (firmada con clave estable)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PZC_KEYSTORE_PATH="$ANDROID_KEYSTORE_PATH" \
            -PZC_KEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PZC_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PZC_VERSION_CODE="${{ github.run_number }}" \
            -PZC_VERSION_NAME="$APP_VERSION"

      - name: Subir la APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: zona-cliente-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Renombrar la APK
        run: cp android/app/build/outputs/apk/release/app-release.apk zona-cliente-latest.apk

      - name: Publicar Release en GitHub
        run: |
          gh release create "v$APP_VERSION" \
            --title "Zona Cliente v$APP_VERSION" \
            --notes "APK de Zona Cliente v$APP_VERSION. Generada automáticamente desde GitHub Actions." \
            2>/dev/null || true
          gh release upload "v$APP_VERSION" zona-cliente-latest.apk --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
